[options]
query_inverter_secs = 50			# how often to request data from the inverter and write to log file
debug = 4							# Debug level: 0 = none, 1 = high priority, 3 = everything, 4 = also output packets
log_file = "/tmp/zeversolar"		# make sure the user executing the script can write to this file
output_to_log = 1					# 1 = output to the above logfile, 0 = do not
clean_log = 1						# Cleanup log file every month: 0 = disable, 1 = enabled (default)
communication_method = "serial"		# "eth2ser" or "serial"
strings = 2      					# number of PV panel strings connected to the inverter (1 or 2)
power_limit_refresh_mins = 9    	# how often to refresh the power limit in minutes (max 10 before inverter resets) 
state_file = /tmp/zeversolar_state.json  # JSON state file voor web dashboard

[serial]
port = "/dev/ttyUSB0"

[mqtt]
enabled = 1                         # Enable mqtt (0 or 1)
inverter_model = "TLC4000"          # Name of the device (Optional)
host = "192.168.1.113"              # Mqtt Broker IP (Required)
port = 1883                         # Mqtt Broker port (1883 or 8883)
enable_pass = 1                     # Enable password authentication (0 or 1)
user = "zeversolar"                 # Mqtt broker authentication username
password = "zeversolar"    			# Mqtt broker authentication password
topic_prefix = "zeversolar"  		# Mqtt topic prefix (Required)
ha_discovery = 1                   	# Enable Home Assistant auto discovery (0 or 1)
command_topic = zeversolar/command  # Command topic for Home Assistant
response_topic = zeversolar/status  # Response topic for Home Assistant


###############################################################################
#
# PVOutput  (https://pvoutput.org)
#
# How to get your API key and system ID:
#   1. Log in to pvoutput.org
#   2. Go to Settings -> API Settings
#   3. Enable API Access, copy your API Key
#   4. Your System ID is shown on the same page (or under Registered Systems)
#
# interval_mins: how often to upload (minimum 5 for free accounts, 1 for donation accounts)
#
###############################################################################
[pvoutput]
enabled = 1                         # Set to 1 to enable PVOutput uploads
api_key = "pv api key"   # Your PVOutput API key
system_id = "systemid"        # Your PVOutput system ID (numeric)
interval_mins = 5                   # Upload interval in minutes (minimum 5 for free accounts)


###############################################################################
#
# InfluxDB
#
# Supports InfluxDB 1.x and InfluxDB 2.x
# Set version = 1 for InfluxDB 1.x, version = 2 for InfluxDB 2.x
#
# InfluxDB 1.x: uses database + optional username/password
# InfluxDB 2.x: uses org + bucket + token (ignore user/password/database)
#
# The measurement name is the "table" within the database/bucket.
# Each inverter is tagged with its serial number.
#
# Install LWP::UserAgent if not present: cpan install LWP::UserAgent
#
###############################################################################
[influxdb]
enabled = 1                         # Set to 1 to enable InfluxDB writes
host = "192.168.1.113"              # InfluxDB hostname or IP
port = 8086                         # InfluxDB port (default 8086)
version = 1                         # InfluxDB version: 1 or 2

# InfluxDB 1.x settings
database = "InfluxDB"                  # InfluxDB 1.x database name
user = "zeversolar"                       # InfluxDB 1.x username (set to "none" to disable auth)
password = "zeversolar"                   # InfluxDB 1.x password (set to "none" to disable auth)

# InfluxDB 2.x settings (ignored for version = 1)
org = "my-org"                      # InfluxDB 2.x organisation name
bucket = "solar"                    # InfluxDB 2.x bucket name
token = "YOUR_INFLUXDB2_TOKEN"      # InfluxDB 2.x API token

# Common settings
measurement = "TLC4000"            # Measurement (table) name used in both versions


###############################################################################
#
# Domoticz  (https://www.domoticz.com)
#
# Required: create a "Electric (Instant+Counter)" (kWh meter) virtual sensor in Domoticz
#   and enter its IDX below as idx_power.
#
# Optional: create a "Temperature" virtual sensor for the inverter temperature
#   and enter its IDX as idx_temp.
#
# To find the IDX of a device in Domoticz:
#   Go to Setup -> Devices -> look for the IDX column
#
# Basic auth: set domoticz_user and domoticz_password if Domoticz requires login.
#   Leave empty if Domoticz is open on your local network.
#
###############################################################################
[domoticz]
enabled = 1                         # Set to 1 to enable Domoticz updates
host = "192.168.1.128"              # Domoticz hostname or IP
port = 8080                         # Domoticz port (default 8080)
use_https = 0                       # 1 = HTTPS, 0 = HTTP
idx_power = 157                       # IDX of "Electric (Instant+Counter)" kWh device (required)
idx_temp = 156                        # IDX of temperature device (optional, 0 = disabled)
user = "user"                       # Domoticz username for basic auth (set to "none" to disable)
password = "password"                   # Domoticz password for basic auth (set to "none" to disable)
